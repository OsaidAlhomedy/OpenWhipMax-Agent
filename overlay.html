<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenWhipMax Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100vw;
      height: 100vh;
      background: transparent;
      overflow: hidden;
      pointer-events: none;
      user-select: none;
    }

    #crack-container {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      will-change: opacity, transform;
    }

    #crack-container.visible {
      animation: crackFlash 180ms ease-out forwards;
    }

    @keyframes crackFlash {
      0%   { opacity: 0;   transform: scale(0.7) rotate(-5deg); }
      15%  { opacity: 1;   transform: scale(1.1) rotate(3deg); }
      40%  { opacity: 0.9; transform: scale(1.05) rotate(-1deg); }
      100% { opacity: 0;   transform: scale(1.2) rotate(0deg); }
    }

    #whip-svg {
      width: min(60vw, 60vh);
      height: min(60vw, 60vh);
      filter: drop-shadow(0 0 24px rgba(255, 220, 50, 0.9))
              drop-shadow(0 0 48px rgba(255, 160, 0, 0.7));
    }
  </style>
</head>
<body>
  <div id="crack-container">
    <img id="whip-svg" src="assets/whip.svg" alt="" draggable="false" />
  </div>
  <script src="overlay.js"></script>
</body>
</html>
