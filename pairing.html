<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenWhipMax — Pair Phone</title>
  <style>
    :root {
      --bg: #1a1a1a;
      --fg: #f0f0f0;
      --accent: #f0a500;
      --muted: #888;
      --radius: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      gap: 20px;
      text-align: center;
    }

    h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
    }

    p.subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      max-width: 300px;
    }

    #qr-wrapper {
      background: #fff;
      padding: 12px;
      border-radius: var(--radius);
      line-height: 0;
    }

    #qr-img {
      width: 256px;
      height: 256px;
      display: block;
    }

    #uri-box {
      font-size: 0.7rem;
      color: var(--muted);
      word-break: break-all;
      max-width: 340px;
      background: #111;
      padding: 8px 12px;
      border-radius: 6px;
      font-family: monospace;
    }

    button {
      background: #2a2a2a;
      color: var(--fg);
      border: 1px solid #444;
      padding: 8px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.15s;
    }

    button:hover { background: #3a3a3a; }

    #revoke-msg {
      font-size: 0.75rem;
      color: var(--accent);
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <h1>⚡ OpenWhipMax</h1>
  <p class="subtitle">Scan with the OpenWhipMax phone app to pair automatically.</p>

  <div id="qr-wrapper">
    <img id="qr-img" src="" alt="QR Code" />
  </div>

  <div id="uri-box">Generating…</div>
  <div id="revoke-msg"></div>

  <button id="revoke-btn">Revoke &amp; regenerate token</button>

  <script>
    const qrImg = document.getElementById('qr-img');
    const uriBox = document.getElementById('uri-box');
    const revokeBtn = document.getElementById('revoke-btn');
    const revokeMsg = document.getElementById('revoke-msg');

    window.openwhipmax.onQrData(({ qrDataUrl, uri }) => {
      qrImg.src = qrDataUrl;
      uriBox.textContent = uri;
    });

    revokeBtn.addEventListener('click', () => {
      window.openwhipmax.revokeToken();
    });

    window.openwhipmax.onTokenRevoked(() => {
      revokeMsg.textContent = 'Token regenerated — QR updated.';
      setTimeout(() => { revokeMsg.textContent = ''; }, 3000);
    });
  </script>
</body>
</html>
